apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-32b-deployment
  labels:
    app: qwen3-32b
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qwen3-32b
  template:
    metadata:
      labels:
        app: qwen3-32b
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: tpu-v6e-flex-pool
        cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
        cloud.google.com/gke-tpu-topology: 2x4
      tolerations:
      - key: "google.com/tpu"
        operator: "Equal"
        value: "present"
        effect: "NoSchedule"
      containers:
      - name: vllm-server
        image: vllm/vllm-tpu
        args:
        - "vllm"
        - "serve"
        - "Qwen/Qwen3-32B-Instruct"
        - "--tensor-parallel-size"
        - "8"
        - "--dtype"
        - "bfloat16"
        - "--gpu-memory-utilization"
        - "0.95"
        - "--max-model-len"
        - "4096"
        - "--no-enable-prefix-caching"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8000"
        - "--trust-remote-code"
        env:
        - name: HF_HOME
          value: /hf-cache
        resources:
          limits:
            google.com/tpu: "8"
          requests:
            google.com/tpu: "8"
        volumeMounts:
        - name: hf-cache
          mountPath: /hf-cache
      volumes:
      - name: hf-cache
        emptyDir:
          medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: qwen3-32b-service
  labels:
    app: qwen3-32b
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app: qwen3-32b
  type: ClusterIP
